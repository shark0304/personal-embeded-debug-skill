<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Embedded Debug Workbench — Architecture</title>
<style>
  :root{--bg:#ffffff;--text:#1f2937;}
  @media(prefers-color-scheme:dark){:root{--bg:#0d1117;--text:#e6edf3;}}
  body{margin:0;background:var(--bg);display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui,-apple-system,sans-serif;}
  svg{max-width:900px;width:100%;height:auto;}
</style>
</head>
<body>
<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.02"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F766E"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="430" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="600" fill="#0F766E" text-anchor="middle">Embedded Debug Workbench</text>
  <text x="430" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#888780" text-anchor="middle">Evidence-first debug skill for embedded systems</text>

  <!-- ===== Phase 1: Collect ===== -->
  <g>
    <rect x="50" y="100" width="180" height="110" rx="8" fill="#f1efe8" stroke="#d3d1c7" stroke-width="0.5"/>
    <text x="140" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">Phase 1</text>
    <text x="140" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">Collect Evidence</text>
    <text x="140" y="171" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">debug_packet.yaml</text>
    <text x="140" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Serial logs · ELF · DTS</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="155" x2="265" y2="155" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Phase 2: Analyze ===== -->
  <g>
    <rect x="275" y="100" width="180" height="110" rx="8" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
    <text x="365" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Phase 2</text>
    <text x="365" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#26215C" text-anchor="middle" dominant-baseline="central">Analyze &amp; Rank</text>
    <text x="365" y="171" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle" dominant-baseline="central">Hypothesis ranking</text>
    <text x="365" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#534AB7" text-anchor="middle" dominant-baseline="central">Runbooks · Patterns</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="155" x2="490" y2="155" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Phase 3: Report ===== -->
  <g>
    <rect x="500" y="100" width="180" height="110" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
    <text x="590" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">Phase 3</text>
    <text x="590" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#04342C" text-anchor="middle" dominant-baseline="central">Generate Report</text>
    <text x="590" y="171" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Scored debug report</text>
    <text x="590" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Verification steps</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="680" y1="155" x2="715" y2="155" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Phase 4: Preserve ===== -->
  <g>
    <rect x="725" y="100" width="120" height="110" rx="8" fill="#f1efe8" stroke="#d3d1c7" stroke-width="0.5"/>
    <text x="785" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">Phase 4</text>
    <text x="785" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">Preserve</text>
    <text x="785" y="171" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Golden</text>
    <text x="785" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">packets</text>
  </g>

  <!-- ===== Supported Platforms ===== -->
  <g>
    <text x="430" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#888780" text-anchor="middle">Supported platforms</text>

    <!-- Row 1 -->
    <rect x="60" y="272" width="100" height="28" rx="14" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
    <text x="110" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Cortex-M</text>

    <rect x="175" y="272" width="80" height="28" rx="14" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
    <text x="215" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Zephyr</text>

    <rect x="270" y="272" width="80" height="28" rx="14" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
    <text x="310" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#993C1D" text-anchor="middle" dominant-baseline="central">ESP-IDF</text>

    <rect x="365" y="272" width="100" height="28" rx="14" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="0.5"/>
    <text x="415" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#185FA5" text-anchor="middle" dominant-baseline="central">Embedded Linux</text>

    <rect x="480" y="272" width="80" height="28" rx="14" fill="#FBEAF0" stroke="#F4C0D1" stroke-width="0.5"/>
    <text x="520" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#993556" text-anchor="middle" dominant-baseline="central">FreeRTOS</text>

    <rect x="575" y="272" width="80" height="28" rx="14" fill="#EAF3DE" stroke="#C0DD97" stroke-width="0.5"/>
    <text x="615" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#3B6D11" text-anchor="middle" dominant-baseline="central">TinyML</text>

    <rect x="670" y="272" width="100" height="28" rx="14" fill="#FAEEDA" stroke="#FAC775" stroke-width="0.5"/>
    <text x="720" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">DMA/Cache</text>

    <rect x="785" y="272" width="80" height="28" rx="14" fill="#FCEBEB" stroke="#F7C1C1" stroke-width="0.5"/>
    <text x="825" y="286" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#A32D2D" text-anchor="middle" dominant-baseline="central">MCUboot</text>
  </g>

  <!-- ===== Workflow detail ===== -->
  <g>
    <rect x="60" y="325" width="170" height="140" rx="8" fill="#f1efe8" stroke="#d3d1c7" stroke-width="0.5"/>
    <text x="145" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">📦 Debug Packet</text>
    <line x1="80" y1="362" x2="210" y2="362" stroke="#d3d1c7" stroke-width="0.5"/>
    <text x="80" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5F5E5A">project_root</text>
    <text x="80" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5F5E5A">├── serial.log</text>
    <text x="80" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5F5E5A">├── build_info.yaml</text>
    <text x="80" y="428" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5F5E5A">├── board_context.yaml</text>
    <text x="80" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5F5E5A">└── fault_regs.bin</text>

    <rect x="260" y="325" width="200" height="140" rx="8" fill="#EEEDFE" stroke="#CECBF6" stroke-width="0.5"/>
    <text x="360" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#26215C" text-anchor="middle" dominant-baseline="central">🔬 Analysis Runbooks</text>
    <line x1="280" y1="362" x2="440" y2="362" stroke="#CECBF6" stroke-width="0.5"/>
    <text x="280" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534AB7">cortex_m_hardfault.md</text>
    <text x="280" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534AB7">zephyr_i2c_sensor_init.md</text>
    <text x="280" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534AB7">dma_cache_coherency.md</text>
    <text x="280" y="428" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534AB7">linux_driver_probe.md</text>
    <text x="280" y="444" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#534AB7">tinyml_latency_memory.md</text>

    <rect x="490" y="325" width="170" height="140" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
    <text x="575" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#04342C" text-anchor="middle" dominant-baseline="central">✅ Verification</text>
    <line x1="510" y1="362" x2="640" y2="362" stroke="#9FE1CB" stroke-width="0.5"/>
    <text x="510" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0F6E56">score_debug_report.py</text>
    <text x="510" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0F6E56">run_skill_regression.py</text>
    <text x="510" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0F6E56">smoke_test_tools.py</text>
    <text x="510" y="428" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0F6E56">validate_evaluation.py</text>

    <rect x="690" y="325" width="140" height="140" rx="8" fill="#f1efe8" stroke="#d3d1c7" stroke-width="0.5"/>
    <text x="760" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">📁 Outputs</text>
    <line x1="710" y1="362" x2="810" y2="362" stroke="#d3d1c7" stroke-width="0.5"/>
    <text x="710" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5F5E5A">debug_report.md</text>
    <text x="710" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5F5E5A">golden_packets/</text>
    <text x="710" y="412" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5F5E5A">regression/</text>
  </g>

  <!-- Separator line -->
  <line x1="60" y1="490" x2="800" y2="490" stroke="#d3d1c7" stroke-width="0.5"/>
  <text x="430" y="508" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#888780" text-anchor="middle">shark0304/personal-embeded-debug-skill · v3.1</text>
</svg>
</body>
</html>
