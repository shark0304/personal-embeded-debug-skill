<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="url(#g)" opacity="0.15"/>
  <!-- Microchip symbol -->
  <rect x="20" y="20" width="40" height="40" rx="4" fill="none" stroke="#0F766E" stroke-width="3"/>
  <!-- Inner grid -->
  <line x1="30" y1="20" x2="30" y2="60" stroke="#0F766E" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="20" x2="50" y2="60" stroke="#0F766E" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="30" x2="60" y2="30" stroke="#0F766E" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="50" x2="60" y2="50" stroke="#0F766E" stroke-width="1.5" opacity="0.6"/>
  <!-- Center dot (debug target) -->
  <circle cx="40" cy="40" r="5" fill="#0F766E"/>
  <!-- Probe tip (arrow from bottom) -->
  <polygon points="40,68 37,62 43,62" fill="#0F766E"/>
  <line x1="40" y1="62" x2="40" y2="58" stroke="#0F766E" stroke-width="2.5"/>
</svg>
