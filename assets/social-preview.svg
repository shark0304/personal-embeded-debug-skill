<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#151b28"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Logo area -->
  <g transform="translate(120, 130)">
    <!-- Microchip -->
    <rect x="0" y="0" width="100" height="100" rx="8" fill="none" stroke="url(#accentGrad)" stroke-width="4"/>
    <line x1="25" y1="0" x2="25" y2="100" stroke="#14B8A6" stroke-width="1.5" opacity="0.5"/>
    <line x1="75" y1="0" x2="75" y2="100" stroke="#14B8A6" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="25" x2="100" y2="25" stroke="#14B8A6" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="75" x2="100" y2="75" stroke="#14B8A6" stroke-width="1.5" opacity="0.5"/>
    <circle cx="50" cy="50" r="12" fill="#14B8A6" opacity="0.8"/>
    <!-- Probe -->
    <polygon points="50,115 44,105 56,105" fill="#14B8A6"/>
    <line x1="50" y1="105" x2="50" y2="100" stroke="#14B8A6" stroke-width="3"/>
  </g>

  <!-- Title -->
  <text x="260" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#e6edf3">Embedded Debug Workbench</text>
  <text x="260" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b949e">Evidence-first debugging skill for Cortex-M, Zephyr, ESP-IDF, Linux, and TinyML</text>

  <!-- Arch boxes -->
  <!-- Layer 1: Collect -->
  <rect x="80" y="290" width="220" height="110" rx="10" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="110" cy="325" r="18" fill="#0F766E" opacity="0.8"/>
  <text x="110" y="332" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  <text x="140" y="328" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#e6edf3">Collect Evidence</text>
  <text x="100" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">debug_packet.yaml</text>
  <text x="100" y="373" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">Serial logs · ELF · DTS</text>

  <!-- Arrow 1→2 -->
  <line x1="300" y1="345" x2="360" y2="345" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#14B8A6"/>
    </marker>
  </defs>

  <!-- Layer 2: Analyze -->
  <rect x="370" y="290" width="220" height="110" rx="10" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="400" cy="325" r="18" fill="#0F766E" opacity="0.8"/>
  <text x="400" y="332" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  <text x="430" y="328" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#e6edf3">Analyze &amp; Rank</text>
  <text x="390" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">Hypothesis ranking</text>
  <text x="390" y="373" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">Runbooks · Patterns</text>

  <!-- Arrow 2→3 -->
  <line x1="590" y1="345" x2="650" y2="345" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: Report -->
  <rect x="660" y="290" width="220" height="110" rx="10" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="690" cy="325" r="18" fill="#0F766E" opacity="0.8"/>
  <text x="690" y="332" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
  <text x="720" y="328" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#e6edf3">Generate Report</text>
  <text x="680" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">Scored debug report</text>
  <text x="680" y="373" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">Verification steps</text>

  <!-- Arrow 3→4 -->
  <line x1="880" y1="345" x2="940" y2="345" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4: Preserve -->
  <rect x="950" y="290" width="220" height="110" rx="10" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="980" cy="325" r="18" fill="#0F766E" opacity="0.8"/>
  <text x="980" y="332" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
  <text x="1010" y="328" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#e6edf3">Preserve</text>
  <text x="970" y="355" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">Golden packets</text>
  <text x="970" y="373" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">Regression tests</text>

  <!-- Supported platforms row -->
  <g transform="translate(80, 440)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="16" fill="#8b949e">Supported platforms:</text>
    <rect x="180" y="-18" width="100" height="30" rx="15" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="230" y="2" font-family="system-ui, sans-serif" font-size="13" fill="#14B8A6" text-anchor="middle">Cortex-M</text>
    <rect x="295" y="-18" width="90" height="30" rx="15" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="340" y="2" font-family="system-ui, sans-serif" font-size="13" fill="#14B8A6" text-anchor="middle">Zephyr</text>
    <rect x="400" y="-18" width="90" height="30" rx="15" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="445" y="2" font-family="system-ui, sans-serif" font-size="13" fill="#14B8A6" text-anchor="middle">ESP-IDF</text>
    <rect x="505" y="-18" width="100" height="30" rx="15" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="555" y="2" font-family="system-ui, sans-serif" font-size="13" fill="#14B8A6" text-anchor="middle">Embedded Linux</text>
    <rect x="620" y="-18" width="80" height="30" rx="15" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="660" y="2" font-family="system-ui, sans-serif" font-size="13" fill="#14B8A6" text-anchor="middle">FreeRTOS</text>
    <rect x="715" y="-18" width="90" height="30" rx="15" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="760" y="2" font-family="system-ui, sans-serif" font-size="13" fill="#14B8A6" text-anchor="middle">TinyML</text>
    <rect x="820" y="-18" width="100" height="30" rx="15" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="870" y="2" font-family="system-ui, sans-serif" font-size="13" fill="#14B8A6" text-anchor="middle">DMA/Cache</text>
    <rect x="935" y="-18" width="100" height="30" rx="15" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
    <text x="985" y="2" font-family="system-ui, sans-serif" font-size="13" fill="#14B8A6" text-anchor="middle">MCUboot/OTA</text>
  </g>

  <!-- Subtitle -->
  <text x="640" y="560" font-family="system-ui, sans-serif" font-size="14" fill="#484f58" text-anchor="middle">shark0304/personal-embeded-debug-skill</text>

  <!-- Accent line bottom -->
  <rect x="0" y="635" width="1280" height="5" fill="url(#accentGrad)"/>
</svg>
