    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
